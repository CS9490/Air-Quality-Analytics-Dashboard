id: purple_air_sensors
namespace: dashboard_raw_data

description: This flow will use the PurpleAir API and extract the sensors from a geographic box which includes NYC, as well as parts of NJ, Long Island, Upstate NY, etc. The data needs to be further cleaned later down the line, but the goal here is to extract the raw data now, and do cleaning later.

tasks:
  - id: collect_stats
    type: io.kestra.plugin.scripts.python.Script
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: python:slim
    dependencies:
      - requests
      - kestra
      - polars
      - httpx
    script: |
      from kestra import Kestra
      import polars as pl
      import httpx
      import os
      from datetime import datetime, timezone
      
      api_key = os.getenv("PURPLE_AIR_API_KEY")
      if not api_key:
        raise ValueError("Missing PURPLE_AIR_API_KEY environment variable.")

      params = {
        "api_key": api_key,
        "fields": "latitude,longitude,position_rating,location_type,last_seen",
        "max_age": 0,
        "nwlat": 40.962891,
        "nwlng": -74.264395,
        "selat": 40.470116,
        "selng": -73.675450,
      }

      response = httpx.get(
        "https://api.purpleair.com/v1/sensors",
        params=params,
        timeout=60,
      )
      response.raise_for_status()
      sensors_json = response.json()

      raw_sensors_df = pl.DataFrame(
        data=sensors_json.get("data", []),
        schema=sensors_json.get("fields", []),
        orient="row",
      )

      cleaned_sensors_df = raw_sensors_df
      if "position_rating" in cleaned_sensors_df.columns:
        cleaned_sensors_df = cleaned_sensors_df.filter(pl.col("position_rating") > 0)
      if "location_type" in cleaned_sensors_df.columns:
        cleaned_sensors_df = cleaned_sensors_df.filter(pl.col("location_type") != 1)
      if "last_seen" in cleaned_sensors_df.columns:
        cleaned_sensors_df = cleaned_sensors_df.with_columns(
          pl.from_epoch(pl.col("last_seen"), time_unit="s").alias("last_seen")
        )

      outputs = {
        "api_status_code": response.status_code,
        "raw_sensor_count": raw_sensors_df.height,
        "filtered_sensor_count": cleaned_sensors_df.height,
        "fetched_at_utc": datetime.now(timezone.utc).isoformat(),
      }
      Kestra.outputs(outputs)